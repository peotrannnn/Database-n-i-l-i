{% extends 'base.html' %}
{% block title %}Đăng nhập | Lái{% endblock %}
{% block content %}
<section class="auth-page">
  <div class="brutal-card auth-card">
    <h1>Đăng nhập</h1>
    <form method="post" class="form-stack">
      <label>
        <span>Email hoặc username</span>
        <input name="identifier" autocomplete="username" required>
      </label>
      <label>
        <span>Mật khẩu</span>
        <input name="password" type="password" autocomplete="current-password" required>
      </label>
      <button class="primary-btn" type="submit">Đăng nhập</button>
    </form>
    <p class="muted center auth-links">
      <a href="{{ url_for('register') }}">Đăng ký</a>
    </p>
  </div>
</section>
{% endblock %}
